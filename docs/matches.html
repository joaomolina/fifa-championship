<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogos - Copa EA FC 26</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-[#020617] text-[#e2e8f0] min-h-screen flex flex-col">
    <div id="header"></div>
    <main id="content" class="max-w-7xl mx-auto px-4 py-8 flex-1 w-full">
        <p class="text-[#64748b] text-center py-20">Carregando...</p>
    </main>
    <div id="footer"></div>
    <script src="js/app.js"></script>
    <script>
        App.init();
        (async () => {
            const [teams, matches] = await Promise.all([App.loadJSON('teams'), App.loadJSON('matches')]);
            const teamMap = {};
            teams.forEach(t => teamMap[t.id] = t);

            const groupMatches = matches.filter(m => m.phase === 'group');
            const bracketMatches = matches.filter(m => m.phase !== 'group');

            const days = {};
            groupMatches.forEach(m => { (days[m.match_day] = days[m.match_day] || []).push(m); });

            const groupHTML = Object.keys(days).sort((a, b) => a - b).map(day => {
                const dayMatches = days[day].map(m => {
                    const h = teamMap[m.home_team_id], a = teamMap[m.away_team_id];
                    const score = m.played ? `<span class="text-[#00B4D8] font-bold text-lg">${m.home_score} - ${m.away_score}</span>` : '<span class="text-[#475569] text-sm">vs</span>';
                    return `<a href="match.html?id=${m.id}" class="flex items-center justify-between bg-[#1e293b] rounded-lg p-4 hover:bg-[#334155] transition">
                        <div class="flex-1 text-right"><span class="text-white font-medium">${h ? App.teamLabel(h.name) : '?'}</span> <span class="text-[#475569] text-xs ml-1">${h ? h.owner : ''}</span></div>
                        <div class="w-24 text-center">${score}</div>
                        <div class="flex-1"><span class="text-[#475569] text-xs mr-1">${a ? a.owner : ''}</span> <span class="text-white font-medium">${a ? App.teamLabel(a.name) : '?'}</span></div>
                    </a>`;
                }).join('');
                return `<div class="card p-6"><h3 class="text-sm font-semibold text-[#00B4D8] mb-4">Rodada ${day}</h3><div class="space-y-2">${dayMatches}</div></div>`;
            }).join('');

            let bracketHTML = '';
            if (bracketMatches.length) {
                const bm = bracketMatches.map(m => {
                    const h = teamMap[m.home_team_id], a = teamMap[m.away_team_id];
                    const score = m.played ? `<span class="text-[#00B4D8] font-bold text-lg">${m.home_score} - ${m.away_score}</span>` : '<span class="text-[#475569] text-sm">vs</span>';
                    return `<a href="match.html?id=${m.id}" class="flex items-center justify-between bg-[#1e293b] rounded-lg p-4 hover:bg-[#334155] transition">
                        <span class="text-xs text-[#00B4D8] font-medium w-40">${App.phaseLabel(m.phase)}</span>
                        <div class="flex-1 text-right"><span class="text-white font-medium">${h ? App.teamLabel(h.name) : '?'}</span></div>
                        <div class="w-24 text-center">${score}</div>
                        <div class="flex-1"><span class="text-white font-medium">${a ? App.teamLabel(a.name) : '?'}</span></div>
                    </a>`;
                }).join('');
                bracketHTML = `<h2 class="text-xl font-semibold text-white mb-4 mt-10">Fase Eliminatoria</h2><div class="card p-6"><div class="space-y-2">${bm}</div></div>`;
            }

            App.html('content', `
                <h1 class="text-3xl font-bold text-white mb-8">Jogos</h1>
                <h2 class="text-xl font-semibold text-white mb-4">Fase de Grupos</h2>
                <div class="space-y-6">${groupHTML}</div>
                ${bracketHTML}
            `);
        })();
    </script>
</body>
</html>
