<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formacao - Copa EA FC 26</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .pitch {
            position: relative;
            background: repeating-linear-gradient(
                to bottom,
                #2d8a4e 0px, #2d8a4e 40px,
                #349955 40px, #349955 80px
            );
            border: 3px solid rgba(255,255,255,0.8);
            border-radius: 4px;
            aspect-ratio: 68 / 105;
            max-height: 75vh;
            margin: 0 auto;
            overflow: hidden;
        }
        .pitch-lines {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }
        .pitch-lines::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            border-top: 2px solid rgba(255,255,255,0.5);
        }
        .center-circle {
            position: absolute;
            width: 30%;
            aspect-ratio: 1;
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .center-dot {
            position: absolute;
            width: 6px;
            height: 6px;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .penalty-area-top {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 56%;
            height: 17%;
            border: 2px solid rgba(255,255,255,0.5);
            border-top: none;
        }
        .goal-area-top {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 28%;
            height: 6%;
            border: 2px solid rgba(255,255,255,0.5);
            border-top: none;
        }
        .penalty-area-bottom {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 56%;
            height: 17%;
            border: 2px solid rgba(255,255,255,0.5);
            border-bottom: none;
        }
        .goal-area-bottom {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 28%;
            height: 6%;
            border: 2px solid rgba(255,255,255,0.5);
            border-bottom: none;
        }
        .slot {
            position: absolute;
            transform: translate(-50%, -50%);
            width: 64px;
            height: 64px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            z-index: 10;
            border: 2px dashed rgba(255,255,255,0.4);
            background: rgba(0,0,0,0.25);
        }
        .slot:hover, .slot.drag-over {
            border-color: #facc15;
            background: rgba(0,0,0,0.5);
            transform: translate(-50%, -50%) scale(1.1);
        }
        .slot.filled {
            border-style: solid;
            border-color: rgba(255,255,255,0.7);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(2px);
        }
        .slot .slot-label {
            font-size: 9px;
            font-weight: 700;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .slot.filled .slot-label {
            display: none;
        }
        .slot .player-name {
            display: none;
            font-size: 10px;
            font-weight: 700;
            color: #fff;
            text-align: center;
            line-height: 1.1;
            max-width: 60px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .slot.filled .player-name {
            display: block;
        }
        .slot .player-ovr {
            display: none;
            font-size: 11px;
            font-weight: 800;
            color: #facc15;
        }
        .slot.filled .player-ovr {
            display: block;
        }
        .slot .player-pos {
            display: none;
            font-size: 8px;
            color: rgba(255,255,255,0.6);
        }
        .slot.filled .player-pos {
            display: block;
        }
        .bench-player {
            cursor: grab;
            transition: all 0.15s;
            user-select: none;
        }
        .bench-player:active {
            cursor: grabbing;
        }
        .bench-player:hover {
            background: #334155 !important;
        }
        .bench-player.dragging {
            opacity: 0.4;
        }
        .bench-player.selected {
            background: #1e3a5f !important;
            border-color: #00B4D8 !important;
        }
        .pos-badge-gk { background: #d97706; }
        .pos-badge-def { background: #2563eb; }
        .pos-badge-mid { background: #16a34a; }
        .pos-badge-fwd { background: #dc2626; }
        .slot-gk { border-color: #d97706; }
        .slot-def { border-color: #3b82f6; }
        .slot-mid { border-color: #22c55e; }
        .slot-fwd { border-color: #ef4444; }
        .slot.filled.slot-gk { background: rgba(217,119,6,0.35); }
        .slot.filled.slot-def { background: rgba(37,99,235,0.35); }
        .slot.filled.slot-mid { background: rgba(22,163,74,0.35); }
        .slot.filled.slot-fwd { background: rgba(220,38,38,0.35); }
    </style>
</head>
<body class="bg-[#020617] text-[#e2e8f0] min-h-screen flex flex-col">
    <div id="header"></div>
    <main id="content" class="max-w-7xl mx-auto px-4 py-8 flex-1 w-full">
        <p class="text-[#64748b] text-center py-20">Carregando...</p>
    </main>
    <div id="footer"></div>
    <script src="js/app.js"></script>
    <script>
        App.init();

        const FORMATIONS = {
            '4-4-2': [
                { x: 50, y: 91, label: 'GK', group: 'GK' },
                { x: 15, y: 74, label: 'LB', group: 'DEF' },
                { x: 38, y: 78, label: 'CB', group: 'DEF' },
                { x: 62, y: 78, label: 'CB', group: 'DEF' },
                { x: 85, y: 74, label: 'RB', group: 'DEF' },
                { x: 15, y: 50, label: 'LM', group: 'MID' },
                { x: 38, y: 53, label: 'CM', group: 'MID' },
                { x: 62, y: 53, label: 'CM', group: 'MID' },
                { x: 85, y: 50, label: 'RM', group: 'MID' },
                { x: 38, y: 26, label: 'ST', group: 'FWD' },
                { x: 62, y: 26, label: 'ST', group: 'FWD' },
            ],
            '4-3-3': [
                { x: 50, y: 91, label: 'GK', group: 'GK' },
                { x: 15, y: 74, label: 'LB', group: 'DEF' },
                { x: 38, y: 78, label: 'CB', group: 'DEF' },
                { x: 62, y: 78, label: 'CB', group: 'DEF' },
                { x: 85, y: 74, label: 'RB', group: 'DEF' },
                { x: 30, y: 53, label: 'CM', group: 'MID' },
                { x: 50, y: 58, label: 'CDM', group: 'MID' },
                { x: 70, y: 53, label: 'CM', group: 'MID' },
                { x: 18, y: 28, label: 'LW', group: 'FWD' },
                { x: 50, y: 23, label: 'ST', group: 'FWD' },
                { x: 82, y: 28, label: 'RW', group: 'FWD' },
            ],
            '4-2-3-1': [
                { x: 50, y: 91, label: 'GK', group: 'GK' },
                { x: 15, y: 74, label: 'LB', group: 'DEF' },
                { x: 38, y: 78, label: 'CB', group: 'DEF' },
                { x: 62, y: 78, label: 'CB', group: 'DEF' },
                { x: 85, y: 74, label: 'RB', group: 'DEF' },
                { x: 38, y: 60, label: 'CDM', group: 'MID' },
                { x: 62, y: 60, label: 'CDM', group: 'MID' },
                { x: 18, y: 40, label: 'LM', group: 'MID' },
                { x: 50, y: 38, label: 'CAM', group: 'MID' },
                { x: 82, y: 40, label: 'RM', group: 'MID' },
                { x: 50, y: 22, label: 'ST', group: 'FWD' },
            ],
            '3-5-2': [
                { x: 50, y: 91, label: 'GK', group: 'GK' },
                { x: 25, y: 78, label: 'CB', group: 'DEF' },
                { x: 50, y: 78, label: 'CB', group: 'DEF' },
                { x: 75, y: 78, label: 'CB', group: 'DEF' },
                { x: 10, y: 52, label: 'LM', group: 'MID' },
                { x: 35, y: 56, label: 'CM', group: 'MID' },
                { x: 50, y: 50, label: 'CAM', group: 'MID' },
                { x: 65, y: 56, label: 'CM', group: 'MID' },
                { x: 90, y: 52, label: 'RM', group: 'MID' },
                { x: 38, y: 26, label: 'ST', group: 'FWD' },
                { x: 62, y: 26, label: 'ST', group: 'FWD' },
            ],
            '4-1-4-1': [
                { x: 50, y: 91, label: 'GK', group: 'GK' },
                { x: 15, y: 74, label: 'LB', group: 'DEF' },
                { x: 38, y: 78, label: 'CB', group: 'DEF' },
                { x: 62, y: 78, label: 'CB', group: 'DEF' },
                { x: 85, y: 74, label: 'RB', group: 'DEF' },
                { x: 50, y: 62, label: 'CDM', group: 'MID' },
                { x: 15, y: 42, label: 'LM', group: 'MID' },
                { x: 38, y: 45, label: 'CM', group: 'MID' },
                { x: 62, y: 45, label: 'CM', group: 'MID' },
                { x: 85, y: 42, label: 'RM', group: 'MID' },
                { x: 50, y: 23, label: 'ST', group: 'FWD' },
            ],
            '3-4-3': [
                { x: 50, y: 91, label: 'GK', group: 'GK' },
                { x: 25, y: 78, label: 'CB', group: 'DEF' },
                { x: 50, y: 78, label: 'CB', group: 'DEF' },
                { x: 75, y: 78, label: 'CB', group: 'DEF' },
                { x: 15, y: 53, label: 'LM', group: 'MID' },
                { x: 40, y: 56, label: 'CM', group: 'MID' },
                { x: 60, y: 56, label: 'CM', group: 'MID' },
                { x: 85, y: 53, label: 'RM', group: 'MID' },
                { x: 18, y: 28, label: 'LW', group: 'FWD' },
                { x: 50, y: 23, label: 'ST', group: 'FWD' },
                { x: 82, y: 28, label: 'RW', group: 'FWD' },
            ],
            '5-3-2': [
                { x: 50, y: 91, label: 'GK', group: 'GK' },
                { x: 10, y: 72, label: 'LB', group: 'DEF' },
                { x: 30, y: 78, label: 'CB', group: 'DEF' },
                { x: 50, y: 78, label: 'CB', group: 'DEF' },
                { x: 70, y: 78, label: 'CB', group: 'DEF' },
                { x: 90, y: 72, label: 'RB', group: 'DEF' },
                { x: 30, y: 52, label: 'CM', group: 'MID' },
                { x: 50, y: 48, label: 'CM', group: 'MID' },
                { x: 70, y: 52, label: 'CM', group: 'MID' },
                { x: 38, y: 26, label: 'ST', group: 'FWD' },
                { x: 62, y: 26, label: 'ST', group: 'FWD' },
            ],
        };

        const POS_AFFINITY = {
            'GK':  { 'GK': 10 },
            'CB':  { 'CB': 10, 'CDM': 3 },
            'LB':  { 'LB': 10, 'LM': 5, 'LW': 3 },
            'RB':  { 'RB': 10, 'RM': 5, 'RW': 3 },
            'CDM': { 'CDM': 10, 'CM': 6, 'CB': 3 },
            'CM':  { 'CM': 10, 'CDM': 6, 'CAM': 6 },
            'CAM': { 'CAM': 10, 'CM': 6, 'CF': 5, 'ST': 3 },
            'LM':  { 'LM': 10, 'LW': 7, 'LB': 4, 'RM': 3 },
            'RM':  { 'RM': 10, 'RW': 7, 'RB': 4, 'LM': 3 },
            'LW':  { 'LW': 10, 'LM': 7, 'ST': 4, 'RW': 3 },
            'RW':  { 'RW': 10, 'RM': 7, 'ST': 4, 'LW': 3 },
            'ST':  { 'ST': 10, 'CF': 8, 'CAM': 4, 'LW': 4, 'RW': 4 },
        };

        function affinityScore(playerPos, slotLabel) {
            const table = POS_AFFINITY[slotLabel];
            if (!table) return 1;
            return table[playerPos] || 1;
        }

        let currentTeam = null;
        let allPlayers = [];
        let slotAssignments = [];
        let selectedBenchPlayer = null;

        function autoFill(teamPlayers, formation) {
            const slots = FORMATIONS[formation];
            const assignments = new Array(slots.length).fill(null);
            const used = new Set();

            const candidates = slots.map((slot, i) => ({
                idx: i, slot,
                scored: teamPlayers
                    .map(p => ({ p, score: affinityScore(p.position, slot.label) * 100 + p.overall }))
                    .sort((a, b) => b.score - a.score)
            }));

            candidates.sort((a, b) => a.scored.filter(s => s.score >= 1000).length - b.scored.filter(s => s.score >= 1000).length);

            for (const c of candidates) {
                for (const { p } of c.scored) {
                    if (!used.has(p.id)) {
                        assignments[c.idx] = p;
                        used.add(p.id);
                        break;
                    }
                }
            }
            return assignments;
        }

        function groupColor(group) {
            return { GK: 'gk', DEF: 'def', MID: 'mid', FWD: 'fwd' }[group] || 'mid';
        }

        function renderPitch(formation) {
            const slots = FORMATIONS[formation];
            const slotsHtml = slots.map((s, i) => {
                const p = slotAssignments[i];
                const color = groupColor(s.group);
                const filledClass = p ? 'filled' : '';
                return `<div class="slot slot-${color} ${filledClass}" data-slot="${i}"
                            style="left:${s.x}%;top:${s.y}%"
                            ondragover="event.preventDefault();this.classList.add('drag-over')"
                            ondragleave="this.classList.remove('drag-over')"
                            ondrop="handleSlotDrop(event,${i})"
                            onclick="handleSlotClick(${i})">
                    <span class="slot-label">${s.label}</span>
                    <span class="player-ovr">${p ? p.overall : ''}</span>
                    <span class="player-name" title="${p ? p.name : ''}">${p ? shortName(p.name) : ''}</span>
                    <span class="player-pos">${p ? p.position : ''}</span>
                </div>`;
            }).join('');

            return `<div class="pitch">
                <div class="pitch-lines"></div>
                <div class="center-circle"></div>
                <div class="center-dot"></div>
                <div class="penalty-area-top"></div>
                <div class="goal-area-top"></div>
                <div class="penalty-area-bottom"></div>
                <div class="goal-area-bottom"></div>
                ${slotsHtml}
            </div>`;
        }

        function shortName(name) {
            const parts = name.split(' ');
            if (parts.length === 1) return name;
            if (name.length <= 12) return name;
            return parts[parts.length - 1];
        }

        function renderBench(teamPlayers, formation) {
            const usedIds = new Set(slotAssignments.filter(Boolean).map(p => p.id));
            const bench = teamPlayers.filter(p => !usedIds.has(p.id));
            const groups = ['GK', 'DEF', 'MID', 'FWD'];
            const groupLabels = { GK: 'Goleiros', DEF: 'Defensores', MID: 'Meias', FWD: 'Atacantes' };

            return groups.map(g => {
                const gp = bench.filter(p => p.position_group === g).sort((a, b) => b.overall - a.overall);
                if (!gp.length) return '';
                const rows = gp.map(p => {
                    const sel = selectedBenchPlayer === p.id ? 'selected' : '';
                    return `<div class="bench-player flex items-center gap-2 p-2 rounded border border-transparent ${sel}"
                                draggable="true"
                                data-player-id="${p.id}"
                                ondragstart="handleDragStart(event,${p.id})"
                                ondragend="handleDragEnd(event)"
                                onclick="handleBenchClick(${p.id})">
                        <span class="px-1.5 py-0.5 rounded text-[10px] font-bold pos-badge-${groupColor(g)}">${p.position}</span>
                        <span class="text-white text-sm font-medium flex-1 truncate">${p.name}</span>
                        <span class="text-[#facc15] text-sm font-bold">${p.overall}</span>
                    </div>`;
                }).join('');
                return `<div class="mb-3">
                    <p class="text-[10px] text-[#64748b] font-semibold uppercase tracking-wider mb-1">${groupLabels[g]}</p>
                    ${rows}
                </div>`;
            }).join('');
        }

        function render(formation) {
            const teamPlayers = allPlayers.filter(p => p.team_id === currentTeam.id);
            const pitchHtml = renderPitch(formation);
            const benchHtml = renderBench(teamPlayers, formation);
            const photo = App.ownerPhoto(currentTeam.owner);
            const photoEl = photo
                ? `<img src="${photo}" alt="${currentTeam.owner}" class="w-10 h-10 rounded-full object-cover border border-[#334155]">`
                : '';

            App.html('content', `
                <div class="flex items-center gap-4 mb-6">
                    <h1 class="text-2xl font-bold text-white">Montagem de Time</h1>
                </div>
                <div class="flex flex-wrap items-center gap-4 mb-6">
                    <div class="flex items-center gap-3">
                        ${photoEl}
                        <select id="teamSelect" onchange="onTeamChange()" class="bg-[#1e293b] text-white border border-[#334155] rounded-lg px-4 py-2 text-sm focus:border-[#00B4D8] focus:outline-none">
                            ${teamsData.map(t => `<option value="${t.id}" ${t.id === currentTeam.id ? 'selected' : ''}>${App.flag(t.name)} ${t.name} — ${t.owner}</option>`).join('')}
                        </select>
                    </div>
                    <select id="formationSelect" onchange="onFormationChange()" class="bg-[#1e293b] text-white border border-[#334155] rounded-lg px-4 py-2 text-sm focus:border-[#00B4D8] focus:outline-none">
                        ${Object.keys(FORMATIONS).map(f => `<option value="${f}" ${f === formation ? 'selected' : ''}>${f}</option>`).join('')}
                    </select>
                    <button onclick="onAutoFill()" class="bg-[#00B4D8] hover:bg-[#0090b0] text-white text-sm font-medium px-4 py-2 rounded-lg transition">Auto-preencher</button>
                    <button onclick="onClear()" class="bg-[#334155] hover:bg-[#475569] text-white text-sm font-medium px-4 py-2 rounded-lg transition">Limpar</button>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-2">${pitchHtml}</div>
                    <div class="card p-4 max-h-[75vh] overflow-y-auto">
                        <h3 class="text-sm font-semibold text-[#94a3b8] mb-3 uppercase tracking-wider">Banco / Reservas</h3>
                        <p class="text-[10px] text-[#475569] mb-3">Arraste para o campo ou clique para selecionar</p>
                        ${benchHtml}
                    </div>
                </div>
            `);
        }

        let teamsData = [];
        let currentFormation = '4-3-3';

        window.onTeamChange = function() {
            const id = parseInt(document.getElementById('teamSelect').value);
            currentTeam = teamsData.find(t => t.id === id);
            selectedBenchPlayer = null;
            const teamPlayers = allPlayers.filter(p => p.team_id === currentTeam.id);
            slotAssignments = autoFill(teamPlayers, currentFormation);
            render(currentFormation);
        };

        window.onFormationChange = function() {
            currentFormation = document.getElementById('formationSelect').value;
            selectedBenchPlayer = null;
            const teamPlayers = allPlayers.filter(p => p.team_id === currentTeam.id);
            slotAssignments = autoFill(teamPlayers, currentFormation);
            render(currentFormation);
        };

        window.onAutoFill = function() {
            selectedBenchPlayer = null;
            const teamPlayers = allPlayers.filter(p => p.team_id === currentTeam.id);
            slotAssignments = autoFill(teamPlayers, currentFormation);
            render(currentFormation);
        };

        window.onClear = function() {
            selectedBenchPlayer = null;
            slotAssignments = new Array(FORMATIONS[currentFormation].length).fill(null);
            render(currentFormation);
        };

        window.handleDragStart = function(event, playerId) {
            event.dataTransfer.setData('text/plain', JSON.stringify({ type: 'bench', playerId }));
            event.target.classList.add('dragging');
        };

        window.handleDragEnd = function(event) {
            event.target.classList.remove('dragging');
        };

        window.handleSlotDrop = function(event, slotIdx) {
            event.preventDefault();
            event.currentTarget.classList.remove('drag-over');
            const raw = event.dataTransfer.getData('text/plain');
            if (!raw) return;
            const data = JSON.parse(raw);

            if (data.type === 'bench') {
                const player = allPlayers.find(p => p.id === data.playerId);
                if (!player) return;
                const existingIdx = slotAssignments.indexOf(slotAssignments.find(p => p && p.id === player.id));
                if (existingIdx >= 0) slotAssignments[existingIdx] = null;
                const displaced = slotAssignments[slotIdx];
                slotAssignments[slotIdx] = player;
            } else if (data.type === 'slot') {
                const fromIdx = data.slotIdx;
                const temp = slotAssignments[slotIdx];
                slotAssignments[slotIdx] = slotAssignments[fromIdx];
                slotAssignments[fromIdx] = temp;
            }
            selectedBenchPlayer = null;
            render(currentFormation);
        };

        window.handleBenchClick = function(playerId) {
            selectedBenchPlayer = selectedBenchPlayer === playerId ? null : playerId;
            render(currentFormation);
        };

        window.handleSlotClick = function(slotIdx) {
            if (selectedBenchPlayer) {
                const player = allPlayers.find(p => p.id === selectedBenchPlayer);
                if (!player) return;
                const existingIdx = slotAssignments.findIndex(p => p && p.id === player.id);
                if (existingIdx >= 0) slotAssignments[existingIdx] = null;
                slotAssignments[slotIdx] = player;
                selectedBenchPlayer = null;
                render(currentFormation);
            } else if (slotAssignments[slotIdx]) {
                const el = document.querySelector(`[data-slot="${slotIdx}"]`);
                if (el) {
                    el.setAttribute('draggable', 'true');
                    el.ondragstart = (e) => {
                        e.dataTransfer.setData('text/plain', JSON.stringify({ type: 'slot', slotIdx }));
                    };
                }
                slotAssignments[slotIdx] = null;
                render(currentFormation);
            }
        };

        (async () => {
            const [teams, players] = await Promise.all([App.loadJSON('teams'), App.loadJSON('players')]);
            teamsData = teams;
            allPlayers = players;

            const paramId = parseInt(App.getParam('id'));
            currentTeam = paramId ? teams.find(t => t.id === paramId) : teams[0];
            if (!currentTeam) currentTeam = teams[0];

            const teamPlayers = allPlayers.filter(p => p.team_id === currentTeam.id);
            slotAssignments = autoFill(teamPlayers, currentFormation);
            render(currentFormation);
        })();
    </script>
</body>
</html>
